<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="../../Nexus.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }
        .delay-5 { animation-delay: 0.5s; opacity: 0; }
        .delay-6 { animation-delay: 0.6s; opacity: 0; }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animated-gradient {
            background: linear-gradient(-45deg, #667eea, #764ba2, #6B8DD6, #8E37D7);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .float { animation: float 3s ease-in-out infinite; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.4); }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .input-focus {
            transition: all 0.3s ease;
        }
        .input-focus:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            height: 20px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .toggle-password:hover { opacity: 1; }

        .strength-bar {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .social-btn {
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex bg-gray-50">

    <!-- Left Panel — Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-md py-8">
            <!-- Mobile logo -->
            <div class="lg:hidden text-center mb-8 animate-fade-in">
                <a href="../../index.html" class="inline-block">
                    <img src="../../Nexus.png" alt="Nexus" class="h-14 w-14 mx-auto mb-3 rounded-xl shadow-lg">
                </a>
                <p class="text-sm text-gray-400">Join the Nexus community</p>
            </div>

            <h2 class="text-3xl font-bold text-gray-900 mb-2 animate-fade-in">Create Account</h2>
            <p class="text-gray-500 mb-8 animate-fade-in delay-1">Join Nexus and start exploring</p>

            <form id="signUpForm" onsubmit="return handleSubmit(event)" class="space-y-5">
                <div class="animate-fade-in delay-1">
                    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your full name" aria-required="true"
                        class="input-focus w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700">
                </div>
                <div class="animate-fade-in delay-2">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com" aria-required="true"
                        class="input-focus w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700">
                </div>
                <div class="animate-fade-in delay-3">
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••" aria-required="true"
                            oninput="checkPasswordStrength()"
                            class="input-focus w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700 pr-12">
                        <img id="togglePassword" class="toggle-password" src="Photos/Eye/Eye-close.svg"
                            alt="Toggle password visibility" onclick="togglePasswordVisibility()">
                    </div>
                    <p id="passwordStrength" class="text-xs mt-2 text-gray-400 h-4"></p>
                    <div class="mt-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                        <div id="strengthBar" class="strength-bar h-full bg-red-500 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <div class="animate-fade-in delay-4">
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-semibold text-lg hover:bg-indigo-700 transition-all duration-300 hover:shadow-lg hover:shadow-indigo-200 active:scale-[0.98]">
                        Create Account
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6 animate-fade-in delay-5">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-sm text-gray-400 font-medium">or continue with</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- Social Buttons -->
            <div class="grid grid-cols-2 gap-3 animate-fade-in delay-5">
                <button class="social-btn flex items-center justify-center gap-2 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-gray-300" aria-label="Sign up with Google">
                    <img src="Photos/Google.svg" alt="Google" class="h-5 w-5"> Google
                </button>
                <button class="social-btn flex items-center justify-center gap-2 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-gray-300" aria-label="Sign up with Apple">
                    <img src="Photos/Apple.svg" alt="Apple" class="h-5 w-5"> Apple
                </button>
                <button class="social-btn flex items-center justify-center gap-2 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-gray-300" aria-label="Sign up with Facebook">
                    <img src="Photos/Facebook.svg" alt="Facebook" class="h-5 w-5"> Facebook
                </button>
                <button class="social-btn flex items-center justify-center gap-2 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-gray-300" aria-label="Sign up with Phone">
                    <img src="Photos/Phone.svg" alt="Phone" class="h-5 w-5"> Phone
                </button>
            </div>

            <p class="mt-8 text-center text-gray-500 animate-fade-in delay-6">
                Already have an account?
                <a href="Sign_in.html" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">Sign In</a>
            </p>
        </div>
    </div>

    <!-- Right Panel — Branding -->
    <div class="hidden lg:flex lg:w-1/2 animated-gradient items-center justify-center p-12 relative overflow-hidden">
        <!-- Particles -->
        <div class="particle w-4 h-4 top-[10%] right-[20%]" style="animation-delay: 0s;"></div>
        <div class="particle w-3 h-3 top-[40%] left-[15%]" style="animation-delay: 0.7s;"></div>
        <div class="particle w-5 h-5 bottom-[20%] right-[15%]" style="animation-delay: 1.4s;"></div>
        <div class="particle w-3 h-3 bottom-[40%] left-[25%]" style="animation-delay: 2.1s;"></div>
        <div class="absolute top-16 right-8 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-16 left-8 w-80 h-80 bg-purple-300/10 rounded-full blur-3xl"></div>

        <div class="relative z-10 text-center text-white max-w-md">
            <a href="../../index.html" class="inline-block group">
                <img src="../../Nexus.png" alt="Nexus" class="h-20 w-20 mx-auto mb-8 rounded-2xl shadow-2xl float ring-4 ring-white/20 transition-transform duration-300 group-hover:scale-110">
            </a>
            <h1 class="text-4xl font-bold mb-4">Join Nexus</h1>
            <p class="text-white/70 text-lg leading-relaxed">Become part of a community exploring the frontiers of technology, nature, and innovation.</p>
        </div>
    </div>

    <script>
        function validateForm() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!name || !email || !password) {
                alert('Please fill in all fields.');
                return false;
            }
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return false;
            }
            return true;
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthText = document.getElementById('passwordStrength');
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;

            if (password.length >= 12) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[!@#$%^&*]/.test(password)) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;

            strengthBar.style.width = strength + '%';

            if (strength === 0) {
                strengthText.textContent = '';
                strengthBar.className = 'strength-bar h-full rounded-full';
            } else if (strength < 50) {
                strengthText.textContent = 'Weak password';
                strengthText.className = 'text-xs mt-2 text-red-500 h-4';
                strengthBar.className = 'strength-bar h-full bg-red-500 rounded-full';
            } else if (strength < 75) {
                strengthText.textContent = 'Getting stronger — add more variety';
                strengthText.className = 'text-xs mt-2 text-amber-500 h-4';
                strengthBar.className = 'strength-bar h-full bg-amber-500 rounded-full';
            } else {
                strengthText.textContent = 'Strong password ✓';
                strengthText.className = 'text-xs mt-2 text-green-500 h-4';
                strengthBar.className = 'strength-bar h-full bg-green-500 rounded-full';
            }
        }

        function togglePasswordVisibility() {
            const passwordField = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            togglePassword.src = type === 'password' ? 'Photos/Eye/Eye-close.svg' : 'Photos/Eye/Eye-open.svg';
        }

        function handleSubmit(event) {
            event.preventDefault();
            if (validateForm()) {
                alert('Account created successfully! Welcome to Nexus.');
                document.getElementById('signUpForm').reset();
                document.getElementById('strengthBar').style.width = '0%';
                document.getElementById('passwordStrength').textContent = '';
            }
        }
    </script>
</body>
</html>
