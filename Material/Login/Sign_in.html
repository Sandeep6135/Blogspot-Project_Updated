<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="../../Nexus.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animated-gradient {
            background: linear-gradient(-45deg, #667eea, #764ba2, #6B8DD6, #8E37D7);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .float { animation: float 3s ease-in-out infinite; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.4); }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .input-focus {
            transition: all 0.3s ease;
        }
        .input-focus:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex bg-gray-50">

    <!-- Left Panel — Branding -->
    <div class="hidden lg:flex lg:w-1/2 animated-gradient items-center justify-center p-12 relative overflow-hidden">
        <!-- Particles -->
        <div class="particle w-4 h-4 top-[12%] left-[15%]" style="animation-delay: 0s;"></div>
        <div class="particle w-3 h-3 top-[30%] right-[20%]" style="animation-delay: 0.8s;"></div>
        <div class="particle w-5 h-5 bottom-[15%] left-[25%]" style="animation-delay: 1.6s;"></div>
        <div class="particle w-3 h-3 bottom-[35%] right-[10%]" style="animation-delay: 2.4s;"></div>
        <div class="absolute top-16 left-8 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-16 right-8 w-80 h-80 bg-purple-300/10 rounded-full blur-3xl"></div>

        <div class="relative z-10 text-center text-white max-w-md">
            <a href="../../index.html" class="inline-block group">
                <img src="../../Nexus.png" alt="Nexus" class="h-20 w-20 mx-auto mb-8 rounded-2xl shadow-2xl float ring-4 ring-white/20 transition-transform duration-300 group-hover:scale-110">
            </a>
            <h1 class="text-4xl font-bold mb-4">Welcome back to Nexus</h1>
            <p class="text-white/70 text-lg leading-relaxed">Sign in to continue exploring ideas at the intersection of technology and innovation.</p>
        </div>
    </div>

    <!-- Right Panel — Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <!-- Mobile logo -->
            <div class="lg:hidden text-center mb-8 animate-fade-in">
                <a href="../../index.html" class="inline-block">
                    <img src="../../Nexus.png" alt="Nexus" class="h-14 w-14 mx-auto mb-3 rounded-xl shadow-lg">
                </a>
                <p class="text-sm text-gray-400">Welcome back to Nexus</p>
            </div>

            <h2 class="text-3xl font-bold text-gray-900 mb-2 animate-fade-in">Sign In</h2>
            <p class="text-gray-500 mb-8 animate-fade-in delay-1">Enter your credentials to access your account</p>

            <form id="signInForm" onsubmit="return validateForm()" class="space-y-5">
                <div class="animate-fade-in delay-2">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com"
                        class="input-focus w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700">
                </div>
                <div class="animate-fade-in delay-3">
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="input-focus w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700">
                </div>
                <div class="animate-fade-in delay-4">
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-semibold text-lg hover:bg-indigo-700 transition-all duration-300 hover:shadow-lg hover:shadow-indigo-200 active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <p class="mt-8 text-center text-gray-500 animate-fade-in delay-4">
                Don't have an account?
                <a href="Sign_up.html" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function validateForm() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('Please fill in all fields.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
